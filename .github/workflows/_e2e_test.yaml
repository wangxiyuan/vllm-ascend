name: 'e2e test'

on:
  workflow_call:
    inputs:
      vllm:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ''
      runner:
        required: true
        type: string
      image:
        required: true
        type: string
      card_count:
        required: true
        type: string
      suite:
        required: true
        type: string
      parts:
        required: false
        type: string
        default: '[0]'
      continue_on_error:
        required: false
        type: boolean
        default: false
      run_non_triton:
        required: false
        type: boolean
        default: false
      run_mooncake:
        required: false
        type: boolean
        default: false
      custom_tests:
        required: false
        type: string
        default: ''
      is_310p:
        required: false
        type: boolean
        default: false
env:
  UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
  UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu/"
  UV_INDEX_STRATEGY: unsafe-best-match
  UV_INSECURE_HOST: cache-service.nginx-pypi-cache.svc.cluster.local
  UV_HTTP_TIMEOUT: 120
  UV_NO_CACHE: 1
  UV_SYSTEM_PYTHON: 1

jobs:
  run-e2e:
    name: ${{ inputs.suite }}-part-${{ matrix.part }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        part: ${{ fromJSON(inputs.parts) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set multi-card environment variables
        if: ${{ inputs.card_count != '1' }}
        run: echo "HCCL_BUFFSIZE=1024" >> $GITHUB_ENV
        shell: bash

      - name: Setup standard test environment
        if: ${{ !inputs.is_310p }}
        uses: ./.github/actions/setup-test-env
        with:
          vllm_ref: ${{ inputs.vllm }}
          image_hash: ${{ inputs.image }}
          ref: ${{ inputs.ref }}
          card_count: ${{ inputs.card_count }}

      - name: Setup 310p test environment
        if: ${{ inputs.is_310p }}
        uses: ./.github/actions/setup-test-env-310p
        with:
          vllm_ref: ${{ inputs.vllm }}
          image_hash: ${{ inputs.image }}
          ref: ${{ inputs.ref }}
          card_count: ${{ inputs.card_count }}

      - name: Install Mooncake wheel
        if: ${{ inputs.run_mooncake }}
        shell: bash
        run: |
          set -euxo pipefail

          apt-get update -y
          apt-get install -y --no-install-recommends \
            libibverbs1 \
            ibverbs-providers \
            librdmacm1 \
            libnuma1 \
            libcurl4
          ldconfig

          MOONCAKE_WHEEL="mooncake_transfer_engine_ascend-0.3.8.post1-cp311-cp311-manylinux_2_17_aarch64.manylinux_2_35_aarch64.whl"
          pip install --no-cache-dir --no-deps \
            "https://vllm-ascend.obs.cn-north-4.myhuaweicloud.com/vllm-ascend/${MOONCAKE_WHEEL}"

          pip show mooncake-transfer-engine-ascend || true

      - name: Run test suite
        if: ${{ inputs.custom_tests == '' && inputs.suite != '' }}
        uses: ./.github/actions/run-e2e-test
        with:
          suite: ${{ inputs.suite }}
          part_id: ${{ matrix.part }}
          part_size: ${{ fromJSON(inputs.parts).length }}
          continue_on_error: ${{ inputs.continue_on_error }}
          log_file: /tmp/e2e-${{ inputs.suite }}-part${{ matrix.part }}.log
          summary_step_name: Run ${{ inputs.suite }} test (part ${{ matrix.part }})
          artifact_name: timing-data-${{ inputs.suite }}-part${{ matrix.part }}

      - name: Run custom tests
        if: ${{ inputs.custom_tests != '' }}
        env:
          PYTORCH_NPU_ALLOC_CONF: max_split_size_mb:256
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        run: |
          pytest -sv --durations=0 ${{ inputs.custom_tests }}
        shell: bash

      - name: Run non-triton test
        if: ${{ inputs.run_non_triton && matrix.part == 0 }}
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        shell: bash
        run: |
          set -o pipefail
          python3 -m pip uninstall -y triton-ascend triton
          pytest -sv --durations=0 tests/e2e/multicard/2-cards/test_aclgraph_capture_replay.py \
            2>&1 | tee /tmp/e2e-non-triton.log
          exit ${PIPESTATUS[0]}

      - name: Summarize non-triton failure
        if: ${{ always() && inputs.run_non_triton && matrix.part == 0 }}
        run: |
          python3 .github/workflows/scripts/ci_log_summary.py \
            --step-name "Run non-triton test" \
            --log-file /tmp/e2e-non-triton.log \
            --output "$GITHUB_STEP_SUMMARY"
